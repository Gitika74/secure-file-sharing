{% extends "base.html" %}
{% block title %}Download File - SecureShare{% endblock %}
{% block content %}
<div class="shared-page">
    <div class="shared-card">
        <div class="file-icon">&#128196;</div>
        <h2>{{ link.original_filename }}</h2>
        <div class="file-details">
            <p>Size: {{ link.file_size | filesize }} | Type: {{ link.file_type | upper }}</p>
            <p>Shared by: {{ link.owner_name }}</p>
        </div>
        <a href="{{ url_for('access_shared', token=token, download=1) }}" class="btn btn-primary btn-lg" style="width: 100%; justify-content: center;">Download File</a>
    </div>
</div>
{% endblock %}
