{% extends "base.html" %}
{% block title %}Password Required - SecureShare{% endblock %}
{% block content %}
<div class="shared-page">
    <div class="shared-card">
        <div class="file-icon">&#128274;</div>
        <h2>Password Required</h2>
        <p class="file-details">This file is password protected. Enter the password to download.</p>
        <p style="margin-bottom: 1rem; color: var(--text-secondary);">File: {{ link.original_filename }} ({{ link.file_size | filesize }})</p>
        <form method="POST" action="{{ url_for('access_shared', token=token) }}">
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="Enter password" required autofocus style="text-align: center;">
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; justify-content: center;">Download</button>
        </form>
    </div>
</div>
{% endblock %}
